name: masjid_connect
description: "Pro Masjid Connect App - Premium Islamic Community Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.3.0
  
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # Location
  geolocator: ^13.0.2
  
  # Auth
  google_sign_in: ^6.2.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  
  # Network
  dio: ^5.7.0
  
  # Media & Video
  video_player: ^2.8.0
  
  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  google_fonts: ^6.2.1
  
  # Notifications
  firebase_messaging: ^15.1.3
  badges: ^3.1.2
  timeago: ^3.7.0
  
  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.20.1
  image_picker: ^1.1.2

  # Localizations
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/images/premium_logo_final.png
    - assets/images/premium_background.png
    - assets/lottie/
