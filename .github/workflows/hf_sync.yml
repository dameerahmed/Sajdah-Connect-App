name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.email "dameerahmed@github-actions"
          git config --global user.name "GitHub Actions"
          
          # Add Hugging Face as a remote
          git remote add hf https://dameerahmed:$HF_TOKEN@huggingface.co/spaces/dameerahmed/sajdah-connect-backend
          
          # Force push ONLY the backend folder contents to Hugging Face
          git push hf $(git subtree split --prefix backend main):main --force
